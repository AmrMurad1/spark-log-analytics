name: Databricks Community Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Sync via Repos API
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          # Get the repo ID first
          REPO_ID=$(databricks repos list | grep "spark-log-analytics" | awk '{print $1}')
          
          # Pull latest main branch into the Databricks Repo
          databricks repos update $REPO_ID --branch main