name: Databricks Community Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Manual Sync to Workspace
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          # Delete existing folder to avoid access denied on overwrite
          databricks workspace delete /Users/amrabdelrahman7788ss@gmail.com/LogInsights --recursive || true
          
          # Import notebooks from repo to workspace
          databricks workspace import-dir ./LogInsights /Users/amrabdelrahman7788ss@gmail.com/LogInsights